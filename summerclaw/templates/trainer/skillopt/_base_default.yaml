# SkillOpt default configuration — base for all environments.
# Environment configs should inherit via: _base_: _base_default.yaml
#
# SummerClaw adaptation of the official Microsoft SkillOpt config schema.
# Supports structured sections: model, train, gradient, optimizer, evaluation, env.

model:
  backend: openai_chat              # LLM backend (openai_chat, azure_openai, etc.)
  optimizer: ""                     # optimizer model name (overrides loop model)
  target: ""                        # target model name (overrides loop model)
  optimizer_backend: ""             # optimizer-specific backend override
  target_backend: ""                # target-specific backend override
  reasoning_effort: medium          # reasoning effort for optimizer LLM calls
  rewrite_reasoning_effort: ""      # reasoning effort for rewrite calls ("" = use reasoning_effort)
  rewrite_max_completion_tokens: 64000
  codex_exec_path: codex
  codex_exec_sandbox: workspace-write
  codex_exec_profile: ""
  codex_exec_full_auto: false
  codex_exec_reasoning_effort: none
  codex_exec_use_sdk: auto
  codex_exec_network_access: false
  codex_exec_web_search: false
  codex_exec_approval_policy: never
  claude_code_exec_path: claude
  claude_code_exec_profile: ""
  claude_code_exec_use_sdk: auto
  claude_code_exec_effort: medium
  claude_code_exec_max_thinking_tokens: 16384
  codex_trace_to_optimizer: true
  azure_openai_endpoint: ""
  azure_openai_api_version: "2024-12-01-preview"
  azure_openai_api_key: ""
  azure_openai_auth_mode: azure_cli
  azure_openai_ad_scope: "https://cognitiveservices.azure.com/.default"
  azure_openai_managed_identity_client_id: ""
  optimizer_azure_openai_endpoint: ""
  optimizer_azure_openai_api_version: "2024-12-01-preview"
  optimizer_azure_openai_api_key: ""
  optimizer_azure_openai_auth_mode: azure_cli
  optimizer_azure_openai_ad_scope: "https://cognitiveservices.azure.com/.default"
  optimizer_azure_openai_managed_identity_client_id: ""
  target_azure_openai_endpoint: ""
  target_azure_openai_api_version: "2024-12-01-preview"
  target_azure_openai_api_key: ""
  target_azure_openai_auth_mode: azure_cli
  target_azure_openai_ad_scope: "https://cognitiveservices.azure.com/.default"
  target_azure_openai_managed_identity_client_id: ""

train:
  num_epochs: 4
  train_size: 0          # 0 = derive from dataset split when available
  batch_size: 40
  workers: 0             # 0 = auto-derive 80% of maxConcurrency; set >0 to override
  accumulation: 1
  seed: 42

gradient:
  minibatch_size: 8
  merge_batch_size: 8
  max_analyst_rounds: 3
  failure_only: false
  # Per-stage workers overrides (default to train.workers if not set)
  # analyst_workers: 0
  # aggregate_workers: 0
  # evaluate_workers: 0

optimizer:
  learning_rate: 4          # max edits per step (edit_budget)
  min_learning_rate: 2      # min edits for decay schedulers
  lr_scheduler: cosine      # constant / linear / cosine / autonomous
  lr_control_mode: fixed    # fixed / autonomous / none
  skill_update_mode: patch  # patch / rewrite_from_suggestions / full_rewrite_minibatch
  use_slow_update: true
  slow_update_samples: 20
  longitudinal_pair_policy: mixed  # mixed / changed / unchanged
  use_meta_skill: true
  use_rejected_buffer: true            # track rejected edits for negative feedback
  rejected_buffer_max_size: 10         # max entries in the rejected buffer
  rejected_buffer_max_summary_chars: 200  # max chars per edit summary

evaluation:
  use_gate: true
  sel_env_num: 0
  test_env_num: 0
  eval_test: true

env:
  name: ""
  skill_init: ""
  split_mode: ratio       # ratio = build deterministic split from data_path; split_dir = use pre-split
  split_ratio: "2:1:7"
  split_seed: 42
  split_dir: ""
  data_path: ""
  split_output_dir: ""
  exec_timeout: 120      # per target model call timeout in seconds
  out_root: ""
  memory_algorithm: null            # null (disable) | naive_memory | nemori_memory | layerga_memory | mem0v3_memory | supermemory_memory | hindsight_memory | mastra_om_memory
  enabled_tools: []               # empty = all default tools; list tool names to enable selectively
